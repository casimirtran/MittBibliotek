<div class="row mt-4">
  <div class="col-md-4">
    <div class="card shadow mb-4">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">{{ isEditing ? 'Redigera Bok' : 'Lägg till ny bok' }}</h5>
      </div>
      <div class="card-body">
        <input type="text" class="form-control mb-2" placeholder="Titel" [(ngModel)]="currentBook.title">
        <input type="text" class="form-control mb-2" placeholder="Författare" [(ngModel)]="currentBook.author">
        <input type="text" class="form-control mb-3" placeholder="Publiceringsår" [(ngModel)]="currentBook.publishDate">
        <button class="btn btn-success w-100" (click)="saveBook()"><i class="fa fa-save"></i> Spara bok</button>
        <button class="btn btn-secondary w-100 mt-2" *ngIf="isEditing" (click)="resetForm()">Avbryt</button>
      </div>
    </div>
  </div>
  
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-header bg-dark text-white">
        <h5 class="mb-0">Alla Böcker</h5>
      </div>
      <ul class="list-group list-group-flush">
        <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let book of books">
          <div>
            <strong>{{ book.title }}</strong> ({{ book.publishDate }})<br>
            <small class="text-muted">av {{ book.author }}</small>
          </div>
          <div>
            <button class="btn btn-sm btn-outline-primary me-2" (click)="editBook(book)"><i class="fa fa-pencil"></i> Redigera</button>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteBook(book.id)"><i class="fa fa-trash"></i> Radera</button>
          </div>
        </li>
        <li class="list-group-item text-center text-muted" *ngIf="books.length === 0">
          Inga böcker tillagda ännu.
        </li>
      </ul>
    </div>
  </div>
</div>
